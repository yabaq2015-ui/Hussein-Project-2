name: EKS 3-Tier App CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull your manifests from GitHub
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Authenticate with AWS using your GitHub Secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: eu-central-1

    # 3. Connect to your EKS Cluster
    - name: Update Kubeconfig for EKS
      run: |
        aws eks update-kubeconfig --region eu-central-1 --name romain-voting-app-cluster

    # 4. Deploy all your working manifests directly to EKS
    - name: Apply Kubernetes Manifests
      run: |
        kubectl apply -f postgres-deploy-svc.yaml
        kubectl apply -f redis-deploy-svc.yaml
        kubectl apply -f vote-deploy-svc.yaml
        kubectl apply -f result-deploy-svc.yaml
        kubectl apply -f worker-deploy.yaml
        kubectl apply -f app-ingress.yaml
